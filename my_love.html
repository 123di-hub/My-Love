<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* BACKGROUND SPLIT */
body::before{
    content:"";
    position:absolute;
    width:50%;
    height:100%;
    left:0;
    top:0;
    background:url("C:/Users/91638/Downloads/ChatGPT Image May 26, 2026, 10_35_41 AM.png");
    background-size:cover;
    background-position:center;
}

body::after{
    content:"";
    position:absolute;
    width:50%;
    height:100%;
    right:0;
    top:0;
    background:url("C:/Users/91638/Downloads/ChatGPT Image May 26, 2026, 10_23_25 AM (1).png");
    background-size:cover;
    background-position:center;
}

/* DARK OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.60);
    z-index:1;
}

/* SHAYARI */
.shayari{
    position:absolute;
    width:100%;
    height:100%;
    z-index:2;
}

.shayari span{
    position:absolute;
    color:rgba(255,255,255,0.18);
    font-size:20px;
    animation:move 12s linear infinite;
}

@keyframes move{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-120vh);}
}

/* HEARTS */
.hearts span{
    position:absolute;
    bottom:-50px;
    color:white;
    font-size:22px;
    animation:heartMove 10s linear infinite;
    z-index:3;
}

@keyframes heartMove{
    0%{transform:translateY(0) scale(0);opacity:0;}
    30%{opacity:1;}
    100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* CARD */
.card{
    position:relative;
    z-index:4;
    width:400px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
    box-shadow:0 0 40px rgba(255,255,255,0.3);
}

.dp{
    width:190px;
    height:190px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 0 30px rgba(255,255,255,0.8);
}

h1{
    margin-top:20px;
    color:white;
    font-size:34px;
}

.typing{
    margin-top:15px;
    color:white;
    font-size:18px;
    line-height:1.8;
    min-height:70px;
    text-align:center;
}

/* SONG LINE */
.song-line {
    margin-top: 14px;
    color: rgba(255,200,200,0.95);
    font-size: 15px;
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.5px;
    line-height: 1.7;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 14px;
    animation: glowText 3s ease-in-out infinite alternate;
}

@keyframes glowText {
    from { text-shadow: 0 0 6px rgba(255,100,150,0.4); }
    to   { text-shadow: 0 0 18px rgba(255,100,150,0.9), 0 0 30px rgba(255,50,100,0.4); }
}

/* MUSIC PLAYER */
.player-wrap {
    margin-top: 18px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.15);
}

.song-title {
    color: white;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    opacity: 0.85;
    letter-spacing: 0.3px;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
}

.ctrl-btn {
    margin: 0;
    padding: 10px 22px;
    border: none;
    border-radius: 50px;
    background: white;
    color: #ff2e63;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
}

.ctrl-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 18px rgba(255,255,255,0.5);
}

/* Visualizer */
.visualizer {
    display: none;
    justify-content: center;
    align-items: flex-end;
    gap: 4px;
    height: 24px;
    margin-top: 10px;
}
.visualizer.active { display: flex; }
.bar {
    width: 5px;
    background: linear-gradient(to top, #ff2e63, #ffb3c6);
    border-radius: 3px;
    animation: barAnim 0.7s ease-in-out infinite alternate;
}
.bar:nth-child(1){animation-duration:0.55s;}
.bar:nth-child(2){animation-duration:0.75s;animation-delay:0.1s;}
.bar:nth-child(3){animation-duration:0.5s;animation-delay:0.2s;}
.bar:nth-child(4){animation-duration:0.85s;animation-delay:0.05s;}
.bar:nth-child(5){animation-duration:0.65s;animation-delay:0.15s;}
.bar:nth-child(6){animation-duration:0.6s;animation-delay:0.3s;}
.bar:nth-child(7){animation-duration:0.9s;animation-delay:0.1s;}
@keyframes barAnim {
    from { height: 4px; }
    to   { height: 22px; }
}

/* BUTTONS */
button.main-btn{
    margin-top:20px;
    padding:13px 32px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff2e63;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: block;
    width: 100%;
}
button.main-btn:hover{
    transform:scale(1.04);
    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* LOVE */
.love{
    margin-top:18px;
    color:white;
    font-size:24px;
    display:none;
    font-weight:bold;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.07);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- MP3 MUSIC -->
<audio id="bgMusic" loop>
    <source src="Meri-Zindagi-Hai-Tu-2_0-Sabri-Sisters.mp3" type="audio/mpeg">
</audio>

<!-- SHAYARI -->
<div class="shayari">
    <span style="left:10%;">💖 Mohabbat sirf tumse hai</span>
    <span style="left:30%; animation-delay:3s;">❤️ Tu hi meri zindagi hai</span>
    <span style="left:50%; animation-delay:6s;">💘 Har saans mein tera naam</span>
    <span style="left:70%; animation-delay:2s;">💕 Tu meri duaon mein hai</span>
</div>

<!-- HEARTS -->
<div class="hearts">
    <span style="left:10%;">❤</span>
    <span style="left:25%; animation-delay:2s;">💖</span>
    <span style="left:40%; animation-delay:4s;">💕</span>
    <span style="left:60%; animation-delay:1s;">💘</span>
    <span style="left:80%; animation-delay:3s;">💞</span>
</div>

<!-- CARD -->
<div class="card">

    <img src="C:/Users/91638/Downloads/ChatGPT Image May 26, 2026, 10_18_49 AM.png" class="dp">

    <h1>My Princess 👑</h1>

    <div class="typing" id="typing"></div>

    <!-- SONG BEST LINE -->
    <div class="song-line">
        🎵 "Meri zindagi hai tu, meri bandagi hai tu<br>
        Tujh bin kahan jaunga, tu hi mera sab kuch hai" 🎵
    </div>

    <!-- MUSIC PLAYER -->
    <div class="player-wrap">
        <div class="song-title">🎶 Meri Zindagi Hai Tu — Sabri Sisters</div>
        <div class="controls">
            <button class="ctrl-btn" id="playBtn" onclick="toggleMusic()">▶ Play</button>
        </div>
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <button class="main-btn" onclick="showLove()">Touch My Heart 💌</button>

    <div class="love" id="loveText">
        I Love You Forever ❤️
    </div>

</div>

<script>

// TYPING EFFECT
let text = "You are my everything ❤️ My life, my happiness, my princess 👑";
let i = 0;
function typeEffect(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

// LOVE
function showLove(){
    document.getElementById("loveText").style.display = "block";
}

// MUSIC TOGGLE
let isPlaying = false;
const audio = document.getElementById("bgMusic");
const playBtn = document.getElementById("playBtn");
const viz = document.getElementById("visualizer");

function toggleMusic(){
    if(!isPlaying){
        audio.play().then(()=>{
            isPlaying = true;
            playBtn.textContent = "⏸ Pause";
            viz.classList.add("active");
        }).catch(e => {
            console.log("Autoplay blocked, user interaction needed.", e);
        });
    } else {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = "▶ Play";
        viz.classList.remove("active");
    }
}

</script>

</body>
</html>
